<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central Técnica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
     <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>

</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 h-screen flex flex-col overflow-hidden transition-colors duration-300 font-sans">

    <header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-6 h-16 flex items-center justify-between z-50 shrink-0">
        <div class="flex items-center gap-4">
            <button onclick="toggleMenu()" class="lg:hidden p-2 text-slate-600 dark:text-slate-400">
                <i class="fas fa-bars text-xl"></i>
            </button>
            <div class="h-6 w-1 bg-blue-600"></div>
            <span class="font-bold text-sm tracking-widest uppercase">Manual</span>
        </div>
        
        <button onclick="toggleDarkMode()" class="w-10 h-10 flex items-center justify-center rounded bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-amber-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition-all">
            <i id="dark-icon" class="fas fa-moon"></i>
        </button>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 transform -translate-x-full transition-transform duration-300 lg:relative lg:translate-x-0 flex flex-col">
            
            <div class="p-4 border-b border-slate-100 dark:border-slate-800 text-center">
                <input type="text" id="busca" onkeyup="filtrarMenu()" placeholder="FILTRAR..." 
                       class="w-full px-3 py-2 bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded text-xs font-bold outline-none focus:border-blue-600 dark:text-white transition-all uppercase tracking-widest text-center">
            </div>

            <nav class="flex-1 overflow-y-auto p-2 space-y-1 no-scrollbar" id="menu-items">
                <div class="px-4 py-3 text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-[0.2em]">Conectividade</div>
                <button onclick="carregar('configuracao-apn.html', this)" class="menu-btn w-full text-left px-4 py-2.5 text-xs font-bold rounded text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all uppercase tracking-wider">
                    Configurar APN
                </button>
                <button onclick="carregar('comandos-gt06.html', this)" class="menu-btn w-full text-left px-4 py-2.5 text-xs font-bold rounded text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all uppercase tracking-wider">
                    Comandos GT06
                </button>

                <div class="px-4 py-3 mt-4 text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-[0.2em]">Dados</div>
                <button onclick="carregar('sql-queries.html', this)" class="menu-btn w-full text-left px-4 py-2.5 text-xs font-bold rounded text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all uppercase tracking-wider">
                    Queries SQL
                </button>
            </nav>
        </aside>

        <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-slate-950/50 z-30 hidden lg:hidden"></div>

        <main class="flex-1 overflow-y-auto p-6 md:p-12 relative bg-slate-50 dark:bg-slate-950">
            <div id="loader" class="hidden absolute inset-0 bg-slate-50/80 dark:bg-slate-950/80 z-20 flex items-center justify-center">
                <div class="w-5 h-5 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            </div>

            <div id="view" class="max-w-4xl mx-auto">
                <div class="py-32 text-center border-2 border-dashed border-slate-200 dark:border-slate-800 rounded-2xl opacity-50">
                    <p class="text-[10px] font-bold text-slate-400 dark:text-slate-600 uppercase tracking-[0.4em]">Aguardando seleção</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        function updateIcon(isDark) {
            document.getElementById('dark-icon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateIcon(isDark);
        }

        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            updateIcon(true);
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function carregar(pagina, btn) {
            const view = document.getElementById('view');
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');

            document.querySelectorAll('.menu-btn').forEach(b => {
                b.classList.remove('bg-blue-600', 'text-white', 'dark:bg-blue-600');
                b.classList.add('text-slate-600', 'dark:text-slate-400');
            });
            btn.classList.add('bg-blue-600', 'text-white');
            btn.classList.remove('text-slate-600', 'dark:text-slate-400');

            if (window.innerWidth < 1024) toggleMenu();

            fetch(pagina)
                .then(r => r.ok ? r.text() : Promise.reject())
                .then(html => { view.innerHTML = `<div class="content-fade">${html}</div>`; })
                .catch(() => {
                    view.innerHTML = `<div class="p-4 bg-red-900 text-white text-[10px] font-mono tracking-widest">ERROR: FILE_NOT_FOUND</div>`;
                })
                .finally(() => loader.classList.add('hidden'));
        }

        function filtrarMenu() {
            const busca = document.getElementById('busca').value.toLowerCase();
            document.querySelectorAll('.menu-btn').forEach(item => {
                item.style.display = item.innerText.toLowerCase().includes(busca) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
