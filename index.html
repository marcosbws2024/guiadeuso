<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BWS Utilitários · Central de Ajuda</title>
    
    <!-- Script Anti-Flash Branco -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuração do Tailwind -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Inter', 'system-ui', 'sans-serif'] 
                    },
                    animation: { 
                        'fade-in': 'fadeIn 0.3s ease-out' 
                    },
                    keyframes: { 
                        fadeIn: { 
                            '0%': { opacity: '0' }, 
                            '100%': { opacity: '1' } 
                        } 
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * { 
            -webkit-font-smoothing: antialiased; 
        }
        
        ::-webkit-scrollbar { 
            width: 5px; 
        }
        
        ::-webkit-scrollbar-thumb { 
            background: rgba(59, 130, 246, 0.5); 
            border-radius: 10px; 
        }

        /* ===== CORPO E MAIN TRANSPARENTES ===== */
        body {
            background: transparent !important;
            font-family: 'Inter', system-ui, sans-serif;
            color: #1a202c;
            transition: color 0.3s ease, background 0.3s ease;
        }
        body.dark {
            color: #f1f5f9;
        }

        main {
            background: transparent !important;
        }

        /* ===== FUNDO PRINCIPAL DA ÁREA DE CONTEÚDO (#view) ===== */
        #view {
            background: #f0f2f5;
            min-height: 100%;
            transition: background 0.3s ease;
            padding: 1rem;
        }
        #view.dark {
            background: #0a0c10;
        }

        /* ===== OS CONTAINERS DAS PÁGINAS NÃO TÊM FUNDO PRÓPRIO ===== */
        #view .container,
        #view .container-fluid,
        #view .pagina-container {
            background: transparent !important;
        }

        /* ===== SIDEBAR ===== */
        .sidebar-glass { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(12px); 
            border-right: 1px solid #e2e8f0;
        }
        
        .dark .sidebar-glass { 
            background: rgba(15, 23, 42, 0.98); 
            border-right: 1px solid #1e293b;
        }

        .menu-btn {
            color: #475569;
            transition: all 0.2s ease;
        }
        .dark .menu-btn {
            color: #94a3b8;
        }
        .menu-btn:hover {
            background: rgba(0, 0, 0, 0.05);
            color: #0f172a;
        }
        .dark .menu-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #f1f5f9;
        }

        .menu-btn-active { 
            background: linear-gradient(135deg, #3b82f6, #2563eb) !important; 
            color: white !important;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .menu-btn-active:hover {
            color: white !important;
            background: linear-gradient(135deg, #2563eb, #1d4ed8) !important;
        }

        /* ===== MODAL DE IMAGENS ===== */
        .image-modal {
            position: fixed; 
            inset: 0; 
            background: rgba(0, 0, 0, 0.96);
            backdrop-filter: blur(20px); 
            z-index: 9999; 
            display: none;
            align-items: center; 
            justify-content: center;
        }
        
        .image-modal.active { 
            display: flex; 
        }

        .side-arrow {
            position: fixed; 
            top: 50%; 
            transform: translateY(-50%);
            width: 64px; 
            height: 64px; 
            display: none;
            align-items: center; 
            justify-content: center;
            background: rgba(255, 255, 255, 0.08); 
            color: white; 
            border-radius: 50%;
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 24px; 
            z-index: 10001; 
            user-select: none;
            backdrop-filter: blur(8px);
        }
        
        .side-arrow:hover { 
            background: #3b82f6; 
            border-color: #3b82f6; 
            transform: translateY(-50%) scale(1.15);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
        }
        
        .side-arrow:active {
            transform: translateY(-50%) scale(0.95);
        }
        
        .side-arrow.prev { 
            left: 30px; 
        }
        
        .side-arrow.next { 
            right: 30px; 
        }

        @media (max-width: 768px) {
            .side-arrow { 
                width: 48px; 
                height: 48px; 
                font-size: 18px; 
            }
            .side-arrow.prev { 
                left: 12px; 
            }
            .side-arrow.next { 
                right: 12px; 
            }
        }

        /* ===== LOADER ===== */
        .loader-spinner {
            width: 40px; 
            height: 40px; 
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-top-color: #3b82f6; 
            border-radius: 50%; 
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }

        /* ===== PLACEHOLDER PARA IMAGENS ===== */
        .img-placeholder {
            background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
            color: #475569;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            padding: 20px;
            border-radius: 8px;
            min-height: 150px;
            flex-direction: column;
            gap: 10px;
        }

        .dark .img-placeholder {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: #94a3b8;
        }

        /* ===== ESTILOS PADRÃO PARA O CONTEÚDO DAS PÁGINAS (fallback) ===== */
        .pagina-container {
            animation: fadeIn 0.3s ease-out;
        }

        .pagina-container h1, 
        .pagina-container h2, 
        .pagina-container h3 {
            color: #0f172a;
        }

        .dark .pagina-container h1, 
        .dark .pagina-container h2, 
        .dark .pagina-container h3 {
            color: #f1f5f9;
        }

        .pagina-container p, 
        .pagina-container li {
            color: #475569;
        }

        .dark .pagina-container p, 
        .dark .pagina-container li {
            color: #cbd5e1;
        }

        .pagina-container .card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
        }

        .dark .pagina-container .card {
            background: #1e293b;
            border: 1px solid #334155;
        }

        .pagina-container .card:hover {
            border-color: #3b82f6;
        }

        .dark .pagina-container .card:hover {
            border-color: #60a5fa;
        }

        .pagina-container .badge {
            background: #e2e8f0;
            color: #475569;
        }

        .dark .pagina-container .badge {
            background: #334155;
            color: #cbd5e1;
        }

        .pagina-container .divider {
            border-color: #e2e8f0;
        }

        .dark .pagina-container .divider {
            border-color: #334155;
        }

        .pagina-container .tutorial-img {
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .pagina-container .tutorial-img:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .dark .pagina-container .tutorial-img:hover {
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .pagina-container code {
            background: #f1f5f9;
            color: #0f172a;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85em;
        }

        .dark .pagina-container code {
            background: #334155;
            color: #e2e8f0;
        }

        .pagina-container .step-number {
            background: #3b82f6;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            flex-shrink: 0;
        }

        /* ===== BORDA DO RODAPÉ DE NAVEGAÇÃO ===== */
        .pagina-nav {
            border-color: #e2e8f0 !important;
        }
        .dark .pagina-nav {
            border-color: #334155 !important;
        }

        /* ===== ANIMAÇÃO ===== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

    <!-- MODAL DE IMAGEM -->
    <div id="imageModal" class="image-modal" onclick="fecharModalExterno(event)">
        <div id="btnPrev" onclick="navegarImagem(-1, event)" class="side-arrow prev">
            <i class="fas fa-chevron-left"></i>
        </div>
        <div id="btnNext" onclick="navegarImagem(1, event)" class="side-arrow next">
            <i class="fas fa-chevron-right"></i>
        </div>
        
        <button onclick="fecharModal()" class="fixed top-6 right-6 text-white/50 hover:text-white text-4xl transition-all z-[10002] hover:scale-110 hover:rotate-90 duration-300">
            <i class="fas fa-times"></i>
        </button>

            <div id="imageCounter" class="text-white/40 text-xs font-mono tracking-widest bg-white/10 px-4 py-1 rounded-full uppercase backdrop-blur-sm border border-white/5"></div>
            <img id="modalImage" src="" alt="Visualização" class="max-h-[75vh] rounded-xl shadow-2xl border border-white/10 object-contain transition-opacity duration-300" style="transform: scale(1);">
            <div id="modalCaption" class="text-white/90 text-sm bg-black/50 backdrop-blur-md px-8 py-3 rounded-2xl border border-white/10 text-center max-w-2xl"></div>
        </div>
    </div>

    <script>
        // ============================================================
        // 1. DEFINIÇÃO GLOBAL IMEDIATA DE FUNÇÕES USADAS POR PÁGINAS
        // ============================================================
        // Estas funções são expostas ao window para serem chamadas via onclick
        // de elementos carregados dinamicamente.
        let currentZoom = 1;
        const ZOOM_STEP = 0.2;
        const MIN_ZOOM = 0.5;
        const MAX_ZOOM = 2.5;

        // Funções de zoom
        window.zoomIn = function() {
            const img = document.getElementById('modalImage');
            if (!img) return;
            if (currentZoom < MAX_ZOOM) {
                currentZoom = Math.min(currentZoom + ZOOM_STEP, MAX_ZOOM);
                aplicarZoom(img);
            }
        };

        window.zoomOut = function() {
            const img = document.getElementById('modalImage');
            if (!img) return;
            if (currentZoom > MIN_ZOOM) {
                currentZoom = Math.max(currentZoom - ZOOM_STEP, MIN_ZOOM);
                aplicarZoom(img);
            }
        };

        window.resetZoom = function() {
            const img = document.getElementById('modalImage');
            if (!img) return;
            currentZoom = 1;
            aplicarZoom(img);
        };

        function aplicarZoom(img) {
            if (!img) return;
            img.style.transform = `scale(${currentZoom})`;
            img.style.cursor = currentZoom > 1 ? 'zoom-out' : 'zoom-in';
            // Atualizar indicador se existir
            const zoomLevel = document.getElementById('zoomLevel');
            if (zoomLevel) zoomLevel.textContent = Math.round(currentZoom * 100) + '%';
        }

        // Navegação
        window.navegarImagem = function(dir, e) {
            if (e) { e.stopPropagation(); e.preventDefault(); }
            if (typeof imagensAtivas !== 'undefined' && imagensAtivas.length > 1) {
                indiceAtual = (indiceAtual + dir + imagensAtivas.length) % imagensAtivas.length;
                if (typeof atualizarModal === 'function') atualizarModal();
            }
        };

        window.fecharModal = function() {
            const modal = document.getElementById('imageModal');
            if (modal) {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            }
        };

        window.fecharModalExterno = function(e) {
            if (e.target.id === 'imageModal') window.fecharModal();
        };

        window.abrirModalPorImagem = function(element) {
            const img = element.querySelector('img');
            if (img) {
                const src = img.src;
                const caption = img.alt || 'Imagem';
                let idx = imagensAtivas.findIndex(d => d.src === src);
                if (idx === -1) {
                    imagensAtivas.push({ src, caption });
                    idx = imagensAtivas.length - 1;
                }
                abrirModal(idx);
            }
        };

        // ============================================================
        // 2. CONFIGURAÇÕES GLOBAIS
        // ============================================================
        let imagensAtivas = [];
        let indiceAtual = 0;
        let paginaAtualIndex = -1;

        const paginas = [
            { id: 'configuracao-apn', label: 'Configurar APN' },
            { id: 'analiselinha', label: 'Análise de Linha' },
            { id: 'expip', label: 'Explicação sobre IP' },
            { id: 'carga-reset', label: 'Carga de Reset', special: true },
            { id: 'conv2g', label: 'Comandos 2G/4G' },
            { id: 'convcomandos', label: 'Conversor de Comandos' },
            { id: 'multiprotocolo', label: 'Multiprotocolo' },
            { id: 'conv4g', label: 'Comandos E3+4G' },
            { id: 'download', label: 'Downloads' },
            { id: 'escala', label: 'Escala & Férias' },
            { id: 'manE32G', label: 'Manual 2G' },
            { id: 'manE34G', label: 'Manual 4G' },
            { id: 'rel-linhaoff', label: 'Linhas Offline' },
            { id: 'rel-linhasbloq', label: 'Linhas Bloqueadas' },
            { id: 'rel-conexoes', label: 'Conexões' },
            { id: 'rel-consumo', label: 'Consumo' }
        ];

        // ============================================================
        // 3. TEMA
        // ============================================================
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeUI(isDark);
            document.dispatchEvent(new CustomEvent('themeChanged', { detail: { isDark } }));
            aplicarTemaNaPagina();
        }

        function updateThemeUI(isDark) {
            const icon = document.getElementById('dark-icon');
            if (icon) icon.className = isDark ? 'fas fa-sun text-amber-400' : 'fas fa-moon text-slate-600';
        }

        function aplicarTemaNaPagina() {
            const isDark = document.documentElement.classList.contains('dark');
            const view = document.getElementById('view');
            if (!view) return;

            view.classList.toggle('dark', isDark);
            document.body.classList.toggle('dark', isDark);

            const seletores = [
                '.pagina-container', '.container', '.container-fluid',
                '.step-card', '.hero-section', '.summary-card', '.footer-modern',
                '.card', '.badge', '.code-block', '.info-box', '.badge-tip'
            ];
            seletores.forEach(sel => {
                view.querySelectorAll(sel).forEach(el => {
                    el.classList.toggle('dark', isDark);
                });
            });

            document.dispatchEvent(new CustomEvent('themeChanged', { detail: { isDark } }));
        }

        // ============================================================
        // 4. MENU
        // ============================================================
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay?.classList.toggle('hidden');
        }

        function filtrarMenu() {
            const termo = document.getElementById('busca').value.toLowerCase();
            document.querySelectorAll('.menu-btn').forEach(btn => {
                btn.style.display = btn.innerText.toLowerCase().includes(termo) ? 'flex' : 'none';
            });
        }

        // ============================================================
        // 5. CARREGAR PÁGINAS
        // ============================================================
        function carregarPagina(id, btn) {
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');
            imagensAtivas = [];

            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('menu-btn-active'));
            if (btn) btn.classList.add('menu-btn-active');
            
            paginaAtualIndex = paginas.findIndex(p => p.id === id);
            if (window.innerWidth < 1024) toggleMenu();

            fetch(`${id}.html`)
                .then(res => {
                    if (!res.ok) throw new Error('Página não encontrada');
                    return res.text();
                })
                .then(html => {
                    document.getElementById('view').innerHTML = `<div class="pagina-container animate-fade-in">${html}</div>`;
                    finalizarCarga(id);
                    aplicarTemaNaPagina();
                })
                .catch(() => {
                    document.getElementById('view').innerHTML = `
                        <div class="pagina-container flex flex-col items-center justify-center min-h-[60vh] text-center">
                            <div class="w-20 h-20 bg-red-50 dark:bg-red-900/30 rounded-3xl flex items-center justify-center text-red-500 mb-6">
                                <i class="fas fa-exclamation-triangle text-3xl"></i>
                            </div>
                            <h3 class="text-xl font-bold mb-2 text-slate-900 dark:text-slate-100">Página não encontrada</h3>
                            <p class="text-slate-500 dark:text-slate-400 text-sm">O conteúdo solicitado está em manutenção ou não existe.</p>
                        </div>
                    `;
                    aplicarTemaNaPagina();
                })
                .finally(() => loader.classList.add('hidden'));
        }

        // ============================================================
        // 6. TUTORIAL CARGA (8 PASSOS)
        // ============================================================
        function carregarTutorialCarga(btn) {
            imagensAtivas = [];
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('menu-btn-active'));
            if (btn) btn.classList.add('menu-btn-active');
            paginaAtualIndex = paginas.findIndex(p => p.id === 'carga-reset');
            if (window.innerWidth < 1024) toggleMenu();

            const passos = [
                { t: "Passo 1: Carregar o arquivo CSV", d: "Na tela principal, clique na área de upload ou arraste o arquivo CSV." },
                { t: "Passo 2: Escolher o identificador", d: "Selecione ICCID (código do chip) ou MSISDN (número do telefone)." },
                { t: "Passo 3: Escolher o tipo de saída", d: "Três formatos: Sem sufixo (BWS), Ponto e vírgula (Comtele), Com vírgula." },
                { t: "Passo 4: Captura do nome da empresa", d: "O sistema lê a segunda linha da primeira coluna para extrair o nome da empresa." },
                { t: "Passo 5: Visualizar registros", d: "Preview dos registros extraídos com estatísticas." },
                { t: "Passo 6: Dividir CSV em partes", d: "Arquivos grandes podem ser divididos em lotes menores." },
                { t: "Passo 7: Exportar CSV (ZIP)", d: "Compacte todos os arquivos em um ZIP." },
                { t: "Passo 8: Arquivos extraídos", d: "Após extrair, você terá os CSVs divididos." }
            ];

            let html = `
                <div class="pagina-container animate-fade-in space-y-8">
                    <div class="bg-blue-600 dark:bg-blue-700 p-8 rounded-3xl text-white shadow-lg transition-colors duration-300">
                        <h1 class="text-3xl font-bold mb-2">Carga de Reset em Massa</h1>
                        <p class="opacity-80">Guia passo a passo para processamento de lotes.</p>
                    </div>
                    <div class="grid gap-6 sm:grid-cols-2">
            `;
            
            passos.forEach((p, i) => {
                const imgPath = `imagens/carregaCSV/TelaCarregaCSV${i+1}.png`;
                html += `
                    <div class="card rounded-2xl p-5 transition-all duration-300 hover:shadow-lg">
                        <h3 class="font-bold text-sm mb-4 flex items-center gap-3">
                            <span class="step-number">${i+1}</span> 
                            <span class="text-slate-900 dark:text-slate-100">${p.t}</span>
                        </h3>
                        <div class="bg-white dark:bg-slate-950 rounded-xl p-3 border border-slate-200 dark:border-slate-800 mb-4 tutorial-img transition-all duration-300" 
                             data-caption="${p.t}: ${p.d}">
                            <img src="${imgPath}" 
                                 alt="${p.t}" 
                                 class="mx-auto rounded-lg w-full h-44 object-contain transition-opacity duration-300" 
                                 onerror="this.parentElement.innerHTML='<div class=\\'img-placeholder\\'><i class=\\'fas fa-image text-2xl\\'></i><span>Imagem ${i+1} indisponível</span></div>'">
                        </div>
                        <p class="text-slate-500 dark:text-slate-400 text-xs leading-relaxed">${p.d}</p>
                    </div>
                `;
            });

            html += `</div></div>`;
            document.getElementById('view').innerHTML = html;
            finalizarCarga('carga-reset');
            aplicarTemaNaPagina();
        }

        // ============================================================
        // 7. FINALIZAR CARGA
        // ============================================================
        function finalizarCarga(pageId) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            mapearImagens();
            gerarRodape(pageId);
        }

        // ============================================================
        // 8. MAPEAR IMAGENS
        // ============================================================
        function mapearImagens() {
            imagensAtivas = [];
            const view = document.getElementById('view');
            if (!view) return;

            const imagens = view.querySelectorAll('img:not(.no-modal)');
            imagens.forEach((img) => {
                let src = img.src || '';
                if (!src || src.includes('undefined') || src.includes('null') || src === '') return;

                let caption = img.alt || 'Imagem';
                const parent = img.closest('[data-caption]');
                if (parent) caption = parent.getAttribute('data-caption');

                imagensAtivas.push({ src, caption });
                img.style.cursor = 'pointer';
                img.onclick = (e) => {
                    e.stopPropagation();
                    const idx = imagensAtivas.findIndex(d => d.src === src);
                    if (idx !== -1) abrirModal(idx);
                };
            });

            document.querySelectorAll('.tutorial-img').forEach(el => {
                el.style.cursor = 'pointer';
                el.onclick = function() {
                    const img = this.querySelector('img');
                    if (img) {
                        const idx = imagensAtivas.findIndex(d => d.src === img.src);
                        if (idx !== -1) abrirModal(idx);
                    }
                };
            });
        }

        // ============================================================
        // 9. MODAL
        // ============================================================
        function abrirModal(index) {
            if (imagensAtivas.length === 0) return;
            if (index < 0 || index >= imagensAtivas.length) index = 0;
            indiceAtual = index;
            atualizarModal();
            document.getElementById('imageModal').classList.add('active');
            document.body.style.overflow = 'hidden';
            const hasMore = imagensAtivas.length > 1;
            document.getElementById('btnPrev').style.display = hasMore ? 'flex' : 'none';
            document.getElementById('btnNext').style.display = hasMore ? 'flex' : 'none';
            // Reset zoom ao abrir
            window.resetZoom();
        }

        function atualizarModal() {
            if (imagensAtivas.length === 0) return;
            const data = imagensAtivas[indiceAtual];
            const modalImg = document.getElementById('modalImage');
            const caption = document.getElementById('modalCaption');
            const counter = document.getElementById('imageCounter');
            if (data && data.src) {
                modalImg.style.opacity = '0.5';
                const img = new Image();
                img.onload = function() {
                    modalImg.src = data.src;
                    modalImg.style.opacity = '1';
                    modalImg.style.display = 'block';
                    // Reset zoom após trocar imagem
                    window.resetZoom();
                };
                img.onerror = function() {
                    modalImg.style.display = 'none';
                    caption.innerHTML = '<span class="text-red-400">⚠️ Imagem não disponível</span>';
                };
                img.src = data.src;
                caption.innerText = data.caption || '';
                counter.innerText = `${indiceAtual + 1} / ${imagensAtivas.length}`;
            }
        }

        // ============================================================
        // 10. RODAPÉ
        // ============================================================
        function gerarRodape() {
            const view = document.getElementById('view');
            const oldNav = view.querySelector('.pagina-nav');
            if (oldNav) oldNav.remove();

            const prev = paginas[paginaAtualIndex - 1];
            const next = paginas[paginaAtualIndex + 1];

            const nav = document.createElement('div');
            nav.className = 'pagina-nav mt-16 pt-8 border-t flex justify-between items-center transition-colors duration-300';
            nav.innerHTML = `
                <div>${prev ? `<button onclick="navegarPagina(${paginaAtualIndex - 1})" class="text-xs font-bold text-slate-400 hover:text-blue-500 dark:text-slate-500 dark:hover:text-blue-400 transition-all hover:scale-105">← ${prev.label.toUpperCase()}</button>` : '<span></span>'}</div>
                <div class="text-[10px] font-mono text-slate-400 dark:text-slate-500">${paginaAtualIndex + 1} / ${paginas.length}</div>
                <div>${next ? `<button onclick="navegarPagina(${paginaAtualIndex + 1})" class="text-xs font-bold text-slate-400 hover:text-blue-500 dark:text-slate-500 dark:hover:text-blue-400 transition-all hover:scale-105">${next.label.toUpperCase()} →</button>` : '<span></span>'}</div>
            `;
            view.appendChild(nav);
        }

        function navegarPagina(idx) {
            if (idx < 0 || idx >= paginas.length) return;
            const p = paginas[idx];
            const b = Array.from(document.querySelectorAll('.menu-btn')).find(el => {
                const label = el.innerText.trim();
                return label === p.label || label.includes(p.label);
            });
            if (p.special) carregarTutorialCarga(b || document.querySelector('.menu-btn'));
            else carregarPagina(p.id, b || document.querySelector('.menu-btn'));
        }

        // ============================================================
        // 11. INICIALIZAÇÃO
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            const isDark = document.documentElement.classList.contains('dark');
            updateThemeUI(isDark);
            aplicarTemaNaPagina();

            document.addEventListener('keydown', (e) => {
                const modal = document.getElementById('imageModal');
                if (!modal.classList.contains('active')) return;
                if (e.key === 'Escape') window.fecharModal();
                if (e.key === 'ArrowLeft') window.navegarImagem(-1, e);
                if (e.key === 'ArrowRight') window.navegarImagem(1, e);
                if (e.key === '+') window.zoomIn();
                if (e.key === '-') window.zoomOut();
                if (e.key === '0') window.resetZoom();
            });

            // Adicionar evento de clique para zoom na imagem (toggle)
            const modalImg = document.getElementById('modalImage');
            if (modalImg) {
                modalImg.addEventListener('click', function() {
                    if (currentZoom === 1) window.zoomIn();
                    else window.resetZoom();
                });
            }
        });

        // ============================================================
        // 12. EXPORTA FUNÇÕES GLOBAIS
        // ============================================================
        window.carregarPagina = carregarPagina;
        window.carregarTutorialCarga = carregarTutorialCarga;
        window.toggleMenu = toggleMenu;
        window.toggleDarkMode = toggleDarkMode;
        window.filtrarMenu = filtrarMenu;
        window.navegarPagina = navegarPagina;
        window.aplicarTemaNaPagina = aplicarTemaNaPagina;
        // As funções de zoom e navegação já foram definidas globalmente no início.
    </script>
</body>
</html>
